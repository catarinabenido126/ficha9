<!DOCTYPE html>
<html lang="pt">
<head>
    <!-- favicon -->
    <link rel="shortcut icon" href="../../assets/img/gym125_white.png" type="image/png">
    <!-- folha de estilos CSS -->
    <link rel="stylesheet" href="../../assets/css/admin.css">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ISEP Ginásio</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Titillium+Web:ital,wght@0,300;0,700;1,400&display=swap"
        rel="stylesheet">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="../../assets/fontawesome/all.min.css">
    <!-- Bootstrap CSS & custom CSS -->
    <link rel="stylesheet" href="../../assets/bootstrap/bootstrap.min.css">
</head>
<body>
    <!-- Navbar -->
    <header class="container-fluid bg-dark text-white">
        <div class="row align-items-center">
            <div class="col-6 d-flex align-items-center p-3">
                <!-- Logo e Nome -->
                <a href="../../index.html">
                    <img alt="Logo do ISEP Ginásio"
                        height="40"
                        src="../../assets/img/gym125_white.png"
                        class="me-3">
                </a>
                <h3 class="mb-0">ISEP Ginásio</h3>
            </div>
            <div class="col-6 text-end p-3">
                <div class="dropdown">

                    <button class="btn btn-secondary dropdown-toggle"
                        type="button"
                        data-bs-toggle="dropdown"
                        aria-expanded="false">
                        <i class="fa-regular fa-user me-2"></i> Utilizador
                    </button>
                    <ul class="dropdown-menu dropdown-menu-end">
                        <li>
                            <a class="dropdown-item" href="#">
                                <i class="fa-solid fa-key me-2"></i>Alterar password
                            </a>
                        </li>
                        <li>
                            <hr class="dropdown-divider">
                        </li>
                        <li>
                            <a class="dropdown-item" href="../../login_form.html">
                                <i class="fa-solid fa-right-from-bracket me-2"></i>Sair
                            </a>
                        </li>
                    </ul>
                </div>
            </div>
        </div>
    </header>

    <div class="container-fluid">

        <div class="row">

            <!-- Sidebar -->
            <aside class="col-md-3 col-lg-2 bg-secondary text-white p-3 min-vh-100">
                <h4>Menu</h4>
                <nav>

                    <a href="../clientes/lista.html"
                        class="nav-link text-white px-0 mb-2 d-block">
                        <i class="fas fa-users me-2"></i> Clientes
                    </a>
                    <a href="../agendamento/agendamento.html"
                        class="nav-link text-white px-0 mb-2 d-block">
                        <i class="fas fa-calendar-alt me-2"></i> Agendamento de treinos
                    </a>
                    <a href="../planos/planos.html"
                        class="nav-link text-white px-0 mb-2 d-block">
                        <i class="fas fa-dumbbell me-2"></i> Planos de Treino
                    </a>
                    <a href="../equipamentos/equipamentos.html"
                        class="nav-link text-white px-0 mb-2 d-block">
                        <i class="fas fa-cogs me-2"></i> Equipamentos
                    </a>
                    <a href="produtos-servicos.html"
                        class="nav-link text-white px-0 mb-2 d-block">
                        <i class="fas fa-box-open me-2"></i> Produtos e Serviços
                    </a>
                </nav>
            </aside>
            <!-- Conteúdo Principal -->
            <main class="col-md-9 col-lg-10 p-4">
                <section>
                    <h2>Preçário Interativo</h2>
                    <p>Escolha o serviço e a frequência para ver o preço.</p>
                </section>
                <div class="row mt-4">
                    <div class="col-md-6 mb-3">
                        <div class="card shadow rounded text-center p-4"
                            onclick="selecionarServico('PT')"><h4>Treino Pers. (PT)</h4>
                            <p>Clique para escolher</p>
                        </div>
                    </div>
                    <div class="col-md-6 mb-3">

                        <div class="card shadow rounded text-center p-4"
                            onclick="selecionarServico('AG')">

                            <h4>Aulas de Grupo (AG)</h4>
                            <p>Clique para escolher</p>
                        </div>
                    </div>
                </div>
                <div id="opcoesPT" style="display:none;">
                    <div class="row mt-3">

                        <div class="col-md-3 mb-2">
                            <button class="btn btn-outline-primary w-100"
                                onclick="mostrarPrecoPT(1)"> 1 vez/semana
                            </button>
                        </div>
                        <div class="col-md-3 mb-2">
                            <button class="btn btn-outline-primary w-100"
                                onclick="mostrarPrecoPT(2)">2 vezes/semana
                            </button>
                        </div>
                        <div class="col-md-3 mb-2">
                            <button class="btn btn-outline-primary w-100"
                                onclick="mostrarPrecoPT(3)"> 3 vezes/semana
                            </button>
                        </div>
                        <div class="col-md-3 mb-2">
                            <button class="btn btn-outline-primary w-100"
                                onclick="mostrarPrecoPT(4)"> 4 vezes/semana
                            </button>
                        </div>
                    </div>
                    <p id="resultadoPT" class="text-center mt-3"></p>
                </div>
                <div id="opcoesAG" style="display:none;">
                    <div class="row mt-3">
                        <div class="col-md-4 mb-2">
                            <button class="btn btn-outline-success w-100"
                                onclick="mostrarPrecoAG(1)"> 1 vez/semana
                            </button>
                        </div>
                        <div class="col-md-4 mb-2">
                            <button class="btn btn-outline-success w-100"
                                onclick="mostrarPrecoAG(2)">2 vezes/semana
                            </button>
                        </div>
                        <div class="col-md-4 mb-2">
                            <button class="btn btn-outline-success w-100"
                                onclick="mostrarPrecoAG('Livre')">
                                Livre
                            </button>
                        </div>
                    </div>
                    <p id="resultadoAG" class="text-center mt-3"></p>
                </div>
            </main>
        </div>
    </div>
    <script src="../../includes/js/funcoes.js"></script>
    <!-- Bootstrap JS -->
    <script src="../../assets/bootstrap/bootstrap.bundle.min.js"></script>
</body>
</html>
